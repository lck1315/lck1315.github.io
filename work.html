<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DODO Family Work | 업무용 북마크 아지트</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <style>
        .work-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .work-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            text-decoration: none;
            transition: var(--transition-bounce);
            position: relative;
        }
        .work-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border-color: var(--primary-color);
        }
        .work-icon-wrap {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            flex-shrink: 0;
        }
        .work-info {
            flex: 1;
            min-width: 0;
        }
        .work-info h4 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-color);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .work-info p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .add-work-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 20px rgba(var(--primary-color-rgb), 0.3);
            border: none;
            cursor: pointer;
            z-index: 99;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .add-work-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }
        .work-category-title {
            margin-top: 40px;
            margin-bottom: 10px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            color: var(--primary-color);
        }
        .work-card-delete {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #ff4757;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .work-card:hover .work-card-delete {
            opacity: 1;
        }
    </style>
</head>
<body class="dark-theme">
    <canvas id="particle-canvas"></canvas>

    <header id="main-header">
        <div class="header-container">
            <a href="index.html" class="logo">DODO<span>.work</span></a>
            <nav class="nav-links">
                <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Family Home</a>
            </nav>
            <div class="header-actions">
                <button id="theme-toggle" aria-label="테마 전환" class="theme-btn">
                    <i class="fa-solid fa-sun"></i>
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main style="padding-top: 100px; padding-bottom: 100px;">
        <section class="section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">회사 업무 아지트</h2>
                    <p class="section-subtitle">자주 사용하는 사내 포털, 업무 도구, 레퍼런스를 한 곳에 모았습니다.</p>
                </div>

                <div id="work-content-container">
                    <!-- JS를 통해 실시간으로 렌더링됩니다 -->
                    <div style="text-align:center; padding: 50px; color: var(--text-muted);"><i class="fa-solid fa-spinner fa-spin"></i> 데이터를 불러오는 중...</div>
                </div>
            </div>
        </section>
    </main>

    <!-- 북마크 추가 모달 -->
    <div id="work-modal-overlay" class="auth-modal-overlay hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 12, 27, 0.9); backdrop-filter: blur(12px); z-index: 1100; display: flex; align-items: center; justify-content: center;">
        <div class="auth-modal-content glass-card" style="width: 90%; max-width: 420px; padding: 2.5rem; position: relative;">
            <span id="work-close-btn" style="position: absolute; right: 20px; top: 15px; font-size: 1.8rem; cursor: pointer; color: var(--text-muted);">&times;</span>
            <h3 style="font-size: 1.4rem; font-weight: 800; margin-bottom: 1.5rem;"><i class="fa-solid fa-link"></i> 새 북마크 추가</h3>
            <form id="work-form" class="auth-form">
                <div class="form-group">
                    <label for="work-category"><i class="fa-solid fa-folder"></i> 카테고리</label>
                    <input type="text" id="work-category" placeholder="예: 사내포털, 협업툴, 디자인" required list="category-list">
                    <datalist id="category-list">
                        <option value="사내 포털">
                        <option value="협업 툴">
                        <option value="디자인/레퍼런스">
                        <option value="개발 도구">
                        <option value="기타">
                    </datalist>
                </div>
                <div class="form-group">
                    <label for="work-title"><i class="fa-solid fa-heading"></i> 제목</label>
                    <input type="text" id="work-title" placeholder="웹사이트 이름" required>
                </div>
                <div class="form-group">
                    <label for="work-url"><i class="fa-solid fa-globe"></i> 링크 (URL)</label>
                    <input type="url" id="work-url" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label for="work-icon"><i class="fa-brands fa-font-awesome"></i> 아이콘 클래스 (선택)</label>
                    <input type="text" id="work-icon" placeholder="예: fa-solid fa-building">
                    <small style="color:var(--text-muted); font-size:0.75rem; margin-top:5px; display:block;">FontAwesome 클래스명. 비워두면 기본 아이콘(fa-link)이 들어갑니다.</small>
                </div>
                <button type="submit" class="btn btn-primary w-100">추가하기 <i class="fa-solid fa-plus"></i></button>
            </form>
        </div>
    </div>

    <!-- 비로그인 알림 모달 -->
    <div id="login-required-modal" class="auth-modal-overlay hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 12, 27, 0.9); backdrop-filter: blur(12px); z-index: 1200; display: flex; align-items: center; justify-content: center;">
        <div class="auth-modal-content glass-card" style="width: 90%; max-width: 400px; padding: 2.5rem; text-align: center; position: relative;">
            <i class="fa-solid fa-lock" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem; animation: floating 6s infinite;"></i>
            <h3 style="font-size: 1.3rem; font-weight: 800; margin-bottom: 1rem;">로그인이 필요합니다</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">북마크를 추가하거나 삭제하려면 먼저 메인 홈 화면에서 로그인해 주세요.</p>
            <button onclick="document.getElementById('login-required-modal').classList.add('hidden')" class="btn btn-secondary w-100">닫기</button>
        </div>
    </div>

    <button id="btn-open-work-modal" class="add-work-btn" title="새 북마크 추가"><i class="fa-solid fa-plus"></i></button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- Work JavaScript -->
    <script src="work.js"></script>
</body>
</html>
